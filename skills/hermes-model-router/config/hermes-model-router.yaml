usage_state: ${HERMES_MODEL_ROUTER_USAGE:-~/.model-router/usage.json}
threshold: 0.95
cooldown_seconds: 300

primary:
  model: gpt-5.5
  provider: openai-codex
  base_url: https://chatgpt.com/backend-api/codex

fallback:
  model: kimi-k2.7-code
  provider: kimi-coding
  base_url: https://api.kimi.com/coding

systems:
  - name: hermes
    home: ${HERMES_HOME:-~/.hermes}
    config_pattern: profiles/{profile}/config.yaml
    profiles: auto
    restart:
      command: ${HERMES_CMD:-hermes}
      args:
        - --profile
        - "{profile}"
        - gateway
        - restart

  - name: openclaw
    home: ${OPENCLAW_HOME:-~/.openclaw}
    config_pattern: profiles/{profile}/config.yaml
    profiles: auto
    restart:
      command: ${OPENCLAW_CMD:-openclaw}
      args:
        - --profile
        - "{profile}"
        - gateway
        - restart
